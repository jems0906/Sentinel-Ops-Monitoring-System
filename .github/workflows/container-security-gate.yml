name: container-security-gate

on:
  push:
    paths:
      - backend/**
      - frontend/**
      - docker-compose.yml
      - backend/Dockerfile
      - frontend/Dockerfile
      - .github/workflows/container-security-gate.yml
  pull_request:
    paths:
      - backend/**
      - frontend/**
      - docker-compose.yml
      - backend/Dockerfile
      - frontend/Dockerfile
      - .github/workflows/container-security-gate.yml
  workflow_dispatch:

jobs:
  scan-dockerfiles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Trivy image source
        run: |
          if docker pull public.ecr.aws/aquasecurity/trivy:0.57.1; then
            echo "TRIVY_IMAGE=public.ecr.aws/aquasecurity/trivy:0.57.1" >> "$GITHUB_ENV"
          else
            docker pull aquasec/trivy:0.57.1
            echo "TRIVY_IMAGE=aquasec/trivy:0.57.1" >> "$GITHUB_ENV"
          fi

      - name: Trivy scan backend Dockerfile (CRITICAL only)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            "$TRIVY_IMAGE" config \
            --severity CRITICAL \
            --exit-code 1 \
            /workspace/backend/Dockerfile

      - name: Trivy scan frontend Dockerfile (CRITICAL only)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            "$TRIVY_IMAGE" config \
            --severity CRITICAL \
            --exit-code 1 \
            /workspace/frontend/Dockerfile

      - name: Generate backend config report (HIGH/MEDIUM, non-blocking)
        if: ${{ always() }}
        continue-on-error: true
        run: |
          mkdir -p security-reports
          docker run --rm \
            -v "$PWD:/workspace" \
            "$TRIVY_IMAGE" config \
            --severity HIGH,MEDIUM \
            --exit-code 0 \
            --format json \
            --output /workspace/security-reports/backend-trivy-config-high-medium.json \
            /workspace/backend/Dockerfile || true

      - name: Generate frontend config report (HIGH/MEDIUM, non-blocking)
        if: ${{ always() }}
        continue-on-error: true
        run: |
          mkdir -p security-reports
          docker run --rm \
            -v "$PWD:/workspace" \
            "$TRIVY_IMAGE" config \
            --severity HIGH,MEDIUM \
            --exit-code 0 \
            --format json \
            --output /workspace/security-reports/frontend-trivy-config-high-medium.json \
            /workspace/frontend/Dockerfile || true

      - name: Upload security reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: container-security-reports
          path: security-reports/*.json
          if-no-files-found: warn
