name: container-security-gate

on:
  push:
    paths:
      - backend/**
      - frontend/**
      - docker-compose.yml
      - backend/Dockerfile
      - frontend/Dockerfile
      - .github/workflows/container-security-gate.yml
  pull_request:
    paths:
      - backend/**
      - frontend/**
      - docker-compose.yml
      - backend/Dockerfile
      - frontend/Dockerfile
      - .github/workflows/container-security-gate.yml
  workflow_dispatch:

jobs:
  scan-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-pull base images
        run: |
          pull_with_fallback() {
            primary="$1"
            fallback="$2"
            n=0
            until [ "$n" -ge 3 ]
            do
              docker pull "$primary" && return 0
              docker pull "$fallback" && return 0
              n=$((n+1))
              echo "Pull attempt $n failed for $primary and $fallback; retrying..."
            done
            echo "Warning: unable to pre-pull $primary (fallback: $fallback). Continuing; build step will retry."
            return 0
          }

          pull_with_fallback public.ecr.aws/docker/library/python:3.12-alpine3.22 python:3.12-alpine3.22
          pull_with_fallback public.ecr.aws/docker/library/node:22-alpine3.22 node:22-alpine3.22
          pull_with_fallback public.ecr.aws/docker/library/nginx:1.29-alpine nginx:1.29-alpine

      - name: Resolve Trivy image source
        run: |
          if docker pull public.ecr.aws/aquasecurity/trivy:0.57.1; then
            echo "TRIVY_IMAGE=public.ecr.aws/aquasecurity/trivy:0.57.1" >> "$GITHUB_ENV"
          else
            docker pull aquasec/trivy:0.57.1
            echo "TRIVY_IMAGE=aquasec/trivy:0.57.1" >> "$GITHUB_ENV"
          fi

      - name: Build backend and frontend images
        run: |
          n=0
          until [ "$n" -ge 3 ]
          do
            docker compose build backend frontend && break
            n=$((n+1))
            echo "Build attempt $n failed; retrying..."
          done
          [ "$n" -lt 3 ]

      - name: Trivy scan backend image
        # Use containerized Trivy to avoid action-version resolution issues.
        # .trivyignore file suppresses acknowledged demo-stage CVEs
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.cache/trivy:/root/.cache \
            -v ${{ github.workspace }}/.trivyignore:/.trivyignore \
            "$TRIVY_IMAGE" image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            sentinelopsmonitoringsystem-backend:latest

      - name: Trivy scan frontend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.cache/trivy:/root/.cache \
            -v ${{ github.workspace }}/.trivyignore:/.trivyignore \
            "$TRIVY_IMAGE" image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            sentinelopsmonitoringsystem-frontend:latest

      - name: Generate high/medium scan reports (non-blocking)
        if: ${{ always() }}
        continue-on-error: true
        run: |
          mkdir -p security-reports

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.cache/trivy:/root/.cache \
            -v ${{ github.workspace }}/.trivyignore:/.trivyignore \
            -v $PWD/security-reports:/reports \
            "$TRIVY_IMAGE" image \
            --severity HIGH,MEDIUM \
            --ignore-unfixed \
            --exit-code 0 \
            --format json \
            --output /reports/backend-trivy-high-medium.json \
            sentinelopsmonitoringsystem-backend:latest || true

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.cache/trivy:/root/.cache \
            -v ${{ github.workspace }}/.trivyignore:/.trivyignore \
            -v $PWD/security-reports:/reports \
            "$TRIVY_IMAGE" image \
            --severity HIGH,MEDIUM \
            --ignore-unfixed \
            --exit-code 0 \
            --format json \
            --output /reports/frontend-trivy-high-medium.json \
            sentinelopsmonitoringsystem-frontend:latest || true

      - name: Upload security reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: container-security-reports
          path: security-reports/*.json
