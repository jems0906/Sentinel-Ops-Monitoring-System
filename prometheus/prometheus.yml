global:
  scrape_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: sentinel_backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
